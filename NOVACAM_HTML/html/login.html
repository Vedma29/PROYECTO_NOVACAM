<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión | NovaCam</title>

    <!-- GOOGLE FONTS -->

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../CSS/login.css">

</head>

<body>

    <section class="login-container">

        <!-- LEFT SIDE -->

        <div class="login-image">

            <div class="overlay"></div>

            <div class="image-content">

                <h1>NovaCam</h1>

                <p>
                    Bienvenida de nuevo a una experiencia
                    elegante y profesional.
                </p>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="login-form">

            <div class="form-box">

                <h2>Iniciar Sesión</h2>

                <p class="subtitle">
                    Accede a tu cuenta NovaCam.
                </p>

                <form>

                    <!-- EMAIL -->

                    <div class="input-group">

                        <label>Correo Electrónico</label>

                        <input type="email" placeholder="correo@email.com">

                    </div>

                    <!-- PASSWORD -->

                    <div class="input-group">

                        <label>Contraseña</label>

                        <input type="password" placeholder="********">

                    </div>

                    <!-- BUTTON -->

                    <button type="submit" class="btn-login">
                        Entrar
                    </button>

                </form>

                <p class="register-link">
                    ¿No tienes cuenta?
                    <a href="register.html">Regístrate</a>
                </p>

            </div>

        </div>

    </section>

</body>

</html>
