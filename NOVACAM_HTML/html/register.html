<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro | NovaCam</title>

    <!-- GOOGLE FONTS -->

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
     
    <link rel="stylesheet" href="../CSS/register.css">

    
</head>

<body>

    <section class="register-container">

        <!-- LEFT SIDE -->

        <div class="register-image">

            <div class="overlay"></div>

            <div class="image-content">

                <h1>NovaCam</h1>

                <p>
                    Elegancia, independencia y crecimiento
                    en una experiencia diseñada para ti.
                </p>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="register-form">

            <div class="form-box">

                <h2>Crear Cuenta</h2>

                <p class="subtitle">
                    Únete a la experiencia NovaCam.
                </p>

                <form>

                    <!-- SEUDONIMO -->

                    <div class="input-group">

                        <label>Seudónimo</label>

                        <input type="text" placeholder="Ej: NovaGirl">

                    </div>

                    <!-- EMAIL -->

                    <div class="input-group">

                        <label>Correo Electrónico</label>

                        <input type="email" placeholder="correo@email.com">

                    </div>

                    <!-- PASSWORD -->

                    <div class="input-group">

                        <label>Contraseña</label>

                        <input type="password" placeholder="********">

                    </div>

                    <!-- EXPERIENCIA -->

                    <div class="input-group">

                        <label>Experiencia</label>

                        <select>

                            <option>Selecciona una opción</option>
                            <option>Menos de 1 año</option>
                            <option>1 año</option>
                            <option>2 años</option>
                            <option>3 años</option>
                            <option>4 años</option>
                            <option>5 años o más</option>

                        </select>

                    </div>

                    <!-- EQUIPO -->

                    <div class="input-group">

                        <label>Equipo Usado</label>

                        <input type="text" placeholder="Ej: Logitech Brio">

                    </div>

                    <!-- BUTTON -->

                    <button type="submit" class="btn-register">
                        Registrarme
                    </button>

                </form>

                <p class="login-link">
                    ¿Ya tienes cuenta?
                    <a href="#">Inicia sesión</a>
                </p>

            </div>

        </div>

    </section>

</body>

</html>
